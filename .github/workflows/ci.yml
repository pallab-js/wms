name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop, main]

jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: SwiftLint
        run: swiftlint --strict

      - name: Build
        run: |
          xcodebuild build \
            -project WarehouseOS/WarehouseOS.xcodeproj \
            -scheme WarehouseOS \
            -destination "platform=macOS" \
            | xcbeautify

      - name: Test
        run: |
          xcodebuild test \
            -project WarehouseOS/WarehouseOS.xcodeproj \
            -scheme WarehouseOS \
            -destination "platform=macOS" \
            | xcbeautify
