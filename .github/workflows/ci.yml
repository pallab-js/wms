name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop, main]

env:
  DEVELOPER_DIR: /Applications/Xcode_16.app

jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: SwiftLint
        run: swiftlint --strict

      - name: Build
        run: swift build

      - name: Test
        run: swift test
